<header class="site-header">
  <a class="site-brand" href="{{ "/" | absURL }}">{{ .Site.Title }}</a>
  <nav class="site-nav">
    {{ range .Site.Menus.main }}
      <a href="{{ .URL | absURL }}"{{ if $.IsMenuCurrent "main" . }} class="is-active" aria-current="page"{{ end }}>{{ .Name }}</a>
    {{ end }}
    <a href="{{ "index.xml" | absURL }}" class="rss-link" aria-label="RSS feed" title="RSS feed">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 11a9 9 0 0 1 9 9"></path>
        <path d="M4 4a16 16 0 0 1 16 16"></path>
        <circle cx="5" cy="19" r="1.5" fill="currentColor" stroke="none"></circle>
      </svg>
    </a>
  </nav>
</header>
